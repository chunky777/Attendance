<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>勤怠管理</title>

<style>

body{
    text-align:center;
    font-family:sans-serif;
}

.title{
    background:#007fb5;
    padding:20px;
    width:300px;
    margin:30px auto;
    font-size:20px;
}

.employee{
    margin:20px;
}

.time{
    margin:20px;
    font-size:18px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:60px;
    margin-top:40px;
}

.btn-in{
    width:150px;
    height:150px;
    background:#0077ff;
    border:none;
    font-size:20px;
    cursor:pointer;
}

.btn-out{
    width:150px;
    height:150px;
    background:#ffd000;
    border:none;
    font-size:20px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="title">
勤怠管理システム
</div>

<div class="employee">
社員名：<span th:text="${employeeName}"></span>
</div>

<div class="time">
現在時刻：<span id="clock"></span>
</div>

<div class="buttons">

<form action="/attendance/clockin" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button class="btn-in">出勤</button>
</form>

<form action="/attendance/clockout" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button class="btn-out">退勤</button>
</form>

</div>

<script>

function updateClock(){
    const now = new Date();
    document.getElementById("clock").textContent =
        now.toLocaleTimeString();
}

setInterval(updateClock,1000);

</script>

</body>
</html>
